name: homewallet-app
services:
  # Database
  db:
    image: postgres:17-alpine3.20
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: homewallet
    healthcheck:
      # $${POSTGRES_DB} uses Docker Compose's $$ escape so the literal ${POSTGRES_DB}
      # is passed to the container shell, which resolves it from the container's environment.
      # Derived configs can override POSTGRES_DB and this healthcheck adapts automatically.
      test: ["CMD-SHELL", "pg_isready -U postgres -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - ./data/homewallet-db/postgres:/var/lib/postgresql/data
    ports:
      - "5555:5432"
